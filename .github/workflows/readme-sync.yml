name: README Sync

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Sync README.md
        run: go run ./cmd/tools/readme-sync/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
