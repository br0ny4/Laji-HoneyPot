run:
  timeout: 3m
  concurrency: 4

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - gocyclo
    - gosec
  disable-all: false

linters-settings:
  gocyclo:
    min-complexity: 15
  gosec:
    excludes:
      - G104  # stderr/stdout not checked (honeypot write errors intentionally suppressed)
  errcheck:
    exclude-functions:
      - (*net.Conn).Write
      - (*net.Conn).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: internal/honeypot/services/
      linters:
        - gosec
      text: "G104"

output:
  formats:
    - format: colored-line-number
