log_level: info
# api_addr 绑定 127.0.0.1 仅本地访问，防止攻击者通过端口扫描发现管理后台
api_addr: "127.0.0.1:8080"
data_dir: "./data"
# api_key 管理后台认证密钥（留空则不启用认证）
api_key: "hp-admin-2024"

plugins:
  honeypot-engine:
    enabled: true
    http_port: 8081
    mysql_port: 3306
    redis_port: 6379
    ssh_port: 2222
    ftp_port: 2121
    ldap_port: 3890
    dns_port: 5354
    smb_port: 4450
    rdp_port: 33890
    tls_fingerprint: "nginx-1.24"
  traceability-engine:
    enabled: true
    update_interval: "24h"
  ops-engine:
    enabled: true
