log_level: info
# api_addr 绑定 127.0.0.1 仅本地访问，防止攻击者通过端口扫描发现管理后台
api_addr: "127.0.0.1:8080"
data_dir: "./data"
# api_key 管理后台认证密钥（留空则不启用认证）
api_key: "hp-admin-2024"

plugins:
  honeypot-engine:
    enabled: true
    http_port: 8081
    mysql_port: 3306
    redis_port: 6379
    ssh_port: 2222
    ftp_port: 2121
    ldap_port: 3890
    dns_port: 5354
    smb_port: 4450
    rdp_port: 33890
    # 自定义 HTTP 响应模板（可选，无需修改代码即可添加蜜罐页面）
    custom_templates:
      # 示例：模拟 Jenkins 控制台
      # - path: "/jenkins/"
      #   status: 200
      #   content_type: "text/html"
      #   body: |
      #     <html><head><title>Jenkins</title></head>
      #     <body><h1>Welcome to Jenkins</h1></body></html>
      #   is_breadcrumb: true
      #
      # 示例：模拟 Grafana 登录
      # - path: "/grafana/login"
      #   status: 200
      #   content_type: "text/html"
      #   body: |
      #     <html><head><title>Grafana</title></head>
      #     <body><h1>Grafana Login</h1>
      #     <form><input name="user"/><input name="password" type="password"/></form>
      #     <!-- /admin/config.php --></body></html>
      #   is_breadcrumb: false
  traceability-engine:
    enabled: true
    update_interval: "24h"
  ops-engine:
    enabled: true

# 告警通道配置（可选，不配置则不启用告警）
alerts:
  # 通用 Webhook（JSON POST 到指定 URL）
  # - type: webhook
  #   enabled: true
  #   url: "https://your-server.com/honeypot/alerts"
