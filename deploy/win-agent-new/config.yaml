# Win11 Agent 配置 — 连接 macOS Manager
# 请将 MANAGER_IP_PLACEHOLDER 替换为 macOS Manager 的局域网 IP (如 192.168.1.x)
api_addr: "0.0.0.0:8080"
db_path: "./honeypot.db"
log_level: "info"

cluster:
  enabled: true
  role: "node"
  manager_addr: "MANAGER_IP_PLACEHOLDER:8443"
  tls_insecure: true

listeners:
  http: { port: 80, enabled: true }
  mysql: { port: 3306, enabled: true }
  redis: { port: 6379, enabled: true }
  ssh: { port: 2222, enabled: true }
  ftp: { port: 2121, enabled: true }
  ldap: { port: 3890, enabled: true }
  dns: { port: 5354, enabled: true }
  smb: { port: 4450, enabled: true }
  rdp: { port: 33890, enabled: true }

traps:
  enabled: true
  web:
    port_80:
      inject_breadcrumb: true
      custom_404: true
      grafana_spoof: true
    port_443:
      inject_breadcrumb: true

ops-engine:
  enabled: true
traceability-engine:
  enabled: true
  update_interval: "24h"
alerts: []
