# Laji-HoneyPot Agent Configuration
# Manager: 请填写 macOS 本机局域网 IP (ifconfig en0 | grep inet)
# Agent: AGENT_IP_PLACEHOLDER (Windows 11)

log_level: info
api_addr: "0.0.0.0:8080"
data_dir: "./data"
api_key: "YOUR_AGENT_API_KEY"

plugins:
  honeypot-engine:
    enabled: true
    # Agent 节点建议用 full 场景全量部署蜜罐
    trap_scenario: "full"
    http_port: 80
    mysql_port: 3306
    redis_port: 6379
    ssh_port: 2222
    ftp_port: 2121
    ldap_port: 3890
    dns_port: 5354
    smb_port: 4450
    rdp_port: 33890
  traceability-engine:
    enabled: true
    update_interval: "24h"
  ops-engine:
    enabled: true

# 集群模式 — Agent 节点
cluster:
  enabled: true
  role: "node"
  # ============================================================
  # 重要: 请将下面 IP 改为 macOS M1 本机的局域网 IP
  # 获取方法: 在 macOS 终端运行 → ipconfig getifaddr en0
  # ============================================================
  manager_addr: "MANAGER_IP_PLACEHOLDER:8443"
  tls_insecure: true
  cert_file: ""
  key_file: ""
  ca_file: ""

alerts: []
